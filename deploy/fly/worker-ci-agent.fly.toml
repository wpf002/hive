app = "hive-worker-ci-agent"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.python-worker"

[build.args]
  WORKER = "ci_agent"

[env]
  HIVE_WORKER_REGION = "fly-ord"
  HIVE_WORKER_ZONE   = "default"
  HIVE_ENV_LABEL     = "production"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
