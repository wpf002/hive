app = "hive-session-sweeper"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.ts-app"

[build.args]
  SERVICE = "apps/session-sweeper"

[env]
  NODE_ENV               = "production"
  SESSION_SWEEPER_PORT   = "4103"
  HIVE_ENV_LABEL         = "production"

[http_service]
  internal_port        = 4103
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval     = "30s"
  method       = "GET"
  path         = "/healthz"
  protocol     = "http"
  timeout      = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
