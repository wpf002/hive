app = "hive-ui"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.ts-app"

[build.args]
  SERVICE = "apps/ui"
  # Empty = the browser uses same-origin requests, proxied to the API by
  # next.config.js. Baked into the client bundle at build time.
  NEXT_PUBLIC_API_BASE = ""

[env]
  NODE_ENV       = "production"
  UI_PORT        = "3001"
  HIVE_ENV_LABEL = "production"
  # Server-side proxy target: Next forwards /api/* and /healthz here over Fly's
  # private network. Keeps session cookies first-party to the UI host.
  API_PROXY_TARGET = "http://hive-api.flycast:4000"

[http_service]
  internal_port        = 3001
  force_https          = true
  auto_stop_machines   = true   # UI is stateless; fine to spin down idle.
  auto_start_machines  = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "20s"
  interval     = "30s"
  method       = "GET"
  path         = "/"
  protocol     = "http"
  timeout      = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory   = "512mb"
