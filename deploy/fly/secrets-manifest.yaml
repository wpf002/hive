# Secrets manifest — which secret goes on which Fly app.
#
# Consumed by deploy/fly/set-secrets.sh. Two kinds of entries:
#   - "passthrough": the value comes from the operator's env file (see
#     deploy/fly/.secrets.env, gitignored). Listed by NAME only.
#   - "literal":     a fixed non-secret config value baked in here as NAME=VALUE.
#
# DATABASE_URL and REDIS_URL are intentionally NOT listed here — they are set by
# `flyctl postgres attach` / the Upstash attach during provision.sh, and the
# set-secrets script must never clobber them.
#
# Workers reach Postgres only through the API, so they get no DATABASE_URL.

# Applied to every app in the manifest.
common:
  passthrough:
    - HIVE_SECRETS_KEY

# Control-plane services that serve authed HTTP + set session cookies.
control_plane_shared: &control_plane_shared
  passthrough:
    - API_AUTH_TOKEN
    - JWT_SECRET
    - SESSION_SECRET
  literal:
    - SECURE_COOKIES=true
    - HIVE_ENV_LABEL=production

# Applied to every worker app.
worker_shared: &worker_shared
  passthrough:
    - WORKER_AUTH_TOKEN
  literal:
    # API_BASE_URL points workers at the API. Use the custom domain once TLS is
    # live (6b); the .fly.dev host works from day one.
    - API_BASE_URL=https://hive-api.fly.dev

services:
  hive-api:
    <<: *control_plane_shared
    passthrough_extra:
      - ADMIN_EMAIL
      - ADMIN_PASSWORD
      - RESEND_API_KEY
      - RESEND_FROM_EMAIL
      - AWS_ACCESS_KEY_ID          # Tigris key from `flyctl storage create`
      - AWS_SECRET_ACCESS_KEY      # Tigris secret
      # Optional: only if you wire audit alerting (6b.2).
      - HIVE_AUDIT_ALERT_EMAIL
    literal_extra:
      - HIVE_EMAIL_PROVIDER=resend
      - HIVE_STORAGE_PROVIDER=s3
      - HIVE_ARTIFACT_S3_BUCKET=hive-artifacts-prod
      - HIVE_ARTIFACT_S3_ENDPOINT=https://fly.storage.tigris.dev
      - HIVE_ARTIFACT_S3_REGION=auto

  hive-ui:
    <<: *control_plane_shared

  hive-dispatcher:
    <<: *control_plane_shared

  hive-scheduler:
    <<: *control_plane_shared

  hive-session-sweeper:
    <<: *control_plane_shared
    passthrough_extra:
      # session-sweeper hosts the audit-alert job (6b.2). Only needed if alerting.
      - HIVE_AUDIT_ALERT_EMAIL
      - RESEND_API_KEY
    literal_extra:
      - RESEND_FROM_EMAIL=no-reply@hive.example.com  # override per your domain

  hive-worker-scraper:
    <<: *worker_shared
    passthrough_extra:
      - ODDS_API_KEY
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-monitor:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-ai-agent:
    <<: *worker_shared
    passthrough_extra:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - PERPLEXITY_API_KEY
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-trading:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord
      - TRADING_LIVE_ENABLED=false   # explicit hard gate — flip deliberately later

  hive-worker-mcp-host:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-ci-agent:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-task-runner:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-discord:
    <<: *worker_shared
    passthrough_extra:
      - DISCORD_BOT_TOKEN
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

    <<: *worker_shared
    passthrough_extra:
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord

  hive-worker-browser:
    <<: *worker_shared
    literal_extra:
      - HIVE_WORKER_REGION=fly-ord
