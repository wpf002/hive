procs:
  api:
    shell: pnpm --filter @hive/api dev
    autostart: true
  ui:
    shell: pnpm --filter @hive/ui dev
    autostart: true
  dispatcher:
    shell: pnpm --filter @hive/dispatcher dev
    autostart: true
  scheduler:
    shell: pnpm --filter @hive/scheduler dev
    autostart: true
  session-sweeper:
    shell: pnpm --filter @hive/session-sweeper dev
    autostart: true
  scraper:
    shell: workers/scraper/.venv/bin/python -m hive_scraper.main
    autostart: true
  monitor:
    shell: workers/monitor/.venv/bin/python -m hive_monitor.main
    autostart: true
  ai_agent:
    shell: pnpm --filter @hive/worker-ai-agent dev
    autostart: true
  discord:
    shell: workers/discord/.venv/bin/python -m hive_discord.main
    autostart: true
  telegram:
    shell: workers/telegram/.venv/bin/python -m hive_telegram.main
    autostart: true
  trading:
    shell: pnpm --filter @hive/worker-trading dev
    autostart: true
  mcp_host:
    shell: pnpm --filter @hive/worker-mcp-host dev
    autostart: true
  ci_agent:
    shell: workers/ci_agent/.venv/bin/python -m hive_ci_agent.main
    autostart: true
  task_runner:
    shell: workers/task_runner/.venv/bin/python -m hive_task_runner.main
    autostart: true
