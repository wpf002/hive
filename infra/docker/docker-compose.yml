services:
  postgres:
    image: postgres:16-alpine
    container_name: hive-postgres
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: hive
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hive-redis
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Phase 5a: S3-compatible storage for artifacts. Set
  # HIVE_STORAGE_PROVIDER=s3 + HIVE_ARTIFACT_S3_ENDPOINT=http://localhost:9000
  # in .env to route artifact uploads here instead of the local FS.
  minio:
    image: minio/minio:latest
    container_name: hive-minio
    environment:
      MINIO_ROOT_USER: hive
      MINIO_ROOT_PASSWORD: hivehive
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # admin console
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
